    <div class="container"> 
         <p class="intro"><b class="intro-btn">💰</b>Spend<span class="intro-spn">Wise</span></p>

     <div class="whole">
     
     <div class="exp">
        <h3 class="intro-expense">Expense tracker <br><span>got your covered</span></h3>
        <div>
            <div id="day">
               <h1 class="first-date" id="date">day</h1>
            </div>
        </div>
     </div>
     <div id="container">
        <!-- first -->
          <div class="total">
            <h3 class="tit1">TOTAL SPENT</h3>
            <div id="inp-money"></div>
            <div id="records"></div>
     </div>
     <!-- second -->
          <div class="avg">
            <h3 class="tit2">AVG PER EXPENSE</h3>
            <div id="avg-records"></div>
     </div>
     <!-- third -->
          <div class="top">
            <h3 class="tit3">TOP CATEGORY</h3>
            <div id="cat-reason"></div>
            <div id="cat-total"></div>
     </div>
     <!-- fourth -->
          <div class="month">
            <h3 class="tit4">THIS MONTH</h3>
            <div id="total-monthly"></div>
     </div>
        <!-- end -->
     </div>

     <div id="reason">
        <button id="opt-all">All</button>
        <button id="opt-food" >Food</button>
        <button id="opt-trnsport">Transport</button>
        <button id="opt-housing">Housing</button>
        <button id="opt-health">Health</button>
        <button id="opt-entertainment">Entertainment</button>
        <button id="opt-utility">Utilities</button>
        <button id="opt-education">Education</button>
        <button id="opt-other">Other</button>
     </div>

     <div class="src">
      <input class="searched" type="search" name="" id="search" placeholder="Search description or reason"><br>
      <select name="" id="opt" class="selected">
        <option value="">Newest first</option>
        <option value="">Oldest first</option>
        <option value="">Highest amount</option>
        <option value="">Lowest amount</option>
      </select>
     </div>
     <!-- =====inputs=========== -->
      
    <div class="inputs">
   <div class="inputs">
      
<input class="search" type="date" id="input-date"><br>

<input class="searched1" type="text" id="input-description" placeholder="Enter description"> <br>

<select id="input-category"> 
    <option value="">Select category</option>
    <option value="Food">Food</option>
    <option value="Transport">Transport</option>
    <option value="Housing">Housing</option>
    <option value="Health">Health</option>
    <option value="Entertainment">Entertainment</option>
    <option value="Utilities">Utilities</option>
    <option value="Education">Education</option>
    <option value="Other">Other</option>
</select> <br>

<input class="searched2" type="text" id="input-reason" placeholder="Enter reason"> <br>
   </div>
</div>
 <div class="last">
<input class="searched3" type="number" id="input-amount" placeholder="&#8358; Enter amount"><br>
 <button class="searched-add" id="add-to">Add to expense</button> <br>
   </div>


    <div id="dash">
       <div class="dash">
         <div class="date"><h2>Date</h2></div>
         <div><h2>Description</h2></div>
         <div><h2>Category</h2></div>
         <div><h2>Reason</h2></div>
         <div><h2>Amount</h2></div>
         </div>
         <div class="dash2">
            <!-- dare -->
             <div id="record-date">
         <h2 id="dates"></h2>
       </div>
         
       <!-- Description -->
        <div id="description">
            <div id="add-description"></div>
        </div>

         <!-- category -->
         <div id="category">
            <div id="add-category"></div>
         </div>

          <!-- reason -->
         <div id="reason-record">
            <div id="add-reason"></div>
         </div>

           <!-- amount -->
            <div id="amount">
           <div class="amount">
             <div id="total-amount"></div>
             <!-- <button class="del"><img class="img" src="delete.png" alt=""></button> -->
           </div>
            <!-- end -->
         </div>
      </div>
     </div>
