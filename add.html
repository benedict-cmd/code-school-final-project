

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Add Bank Account</title>
 <link class="ben1" rel="icon" type="image/png" sizes="256x256" href="ben1.png">
    <link rel="stylesheet" href="add.css">
    <link rel="stylesheet" href="responsive.css">
</head>
<body>

<div class="container">

    <h1 class="title">Add Bank Account</h1>

    <p class="sub-title">
        Connect your preferred payment account securely
    </p>

    <!-- OPTIONS -->

    <h2 class="option-title">Select Payment Provider</h2>

    <div class="payment-options">

        <!-- OPAY -->

        <label class="option-card">

            <input type="radio" name="bank">

            <h3 class="opay">OPay</h3>

            <p>
                Connect your OPay wallet account
            </p>

        </label>

        <!-- MONIEPOINT -->

        <label class="option-card">

            <input type="radio" name="bank">

            <h3 class="moniepoint">Moniepoint</h3>

            <p>
                Link your Moniepoint business account
            </p>

        </label>

        <!-- PAYSTACK -->

        <label class="option-card">

            <input type="radio" name="bank">

            <h3 class="paystack">Paystack</h3>

            <p>
                Connect with Paystack payment gateway
            </p>

        </label>

        <!-- PAYPAL -->

        <label class="option-card">

            <input type="radio" name="bank">

            <h3 class="paypal">PayPal</h3>

            <p>
                Link your international PayPal account
            </p>

        </label>

    </div>

    <!-- FORM -->

    <div class="input-box">
        <label>Account Email / Number</label>

        <input 
        type="text" 
        placeholder="Enter email or account number">
    </div>

    <div class="input-box">
        <label>Account Holder Name</label>

        <input 
        type="text" 
        placeholder="Enter full name">
    </div>

    <div class="input-box">
        <label>Password / API Key</label>

        <input 
        type="password" 
        placeholder="Enter secure key">
    </div>

    <!-- BUTTON -->

    <button class="connect-btn">
        Connect Account
    </button>

</div>

</body>
</html>














    <script src="add.js"></script>
</body>
</html>
